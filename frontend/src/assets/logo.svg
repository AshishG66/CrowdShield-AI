<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <!-- Background Glow -->
  <circle cx="50" cy="50" r="45" fill="url(#glowGrad)" opacity="0.3" filter="blur(4px)" />
  <!-- Main Shield Path -->
  <path d="M50,15 C68,15 78,25 78,45 C78,65 65,78 50,85 C35,78 22,65 22,45 C22,25 32,15 50,15 Z" 
        fill="url(#shieldGrad)" 
        stroke="#ffffff" 
        stroke-width="1.5" 
        filter="drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.15))" />
  <!-- AI Crowd Nodes Network -->
  <!-- Central Pulse Ring -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="3 2" opacity="0.7" />
  <circle cx="50" cy="50" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <!-- Nodes -->
  <circle cx="50" cy="50" r="3.5" fill="#ffffff" />
  <circle cx="50" cy="36" r="3.5" fill="#ffffff" />
  <circle cx="62" cy="57" r="3" fill="#ffffff" opacity="0.9" />
  <circle cx="38" cy="57" r="3" fill="#ffffff" opacity="0.9" />
  <!-- Connections -->
  <line x1="50" y1="50" x2="50" y2="36" stroke="#ffffff" stroke-width="1" opacity="0.8" />
  <line x1="50" y1="50" x2="62" y2="57" stroke="#ffffff" stroke-width="1" opacity="0.8" />
  <line x1="50" y1="50" x2="38" y2="57" stroke="#ffffff" stroke-width="1" opacity="0.8" />
  <line x1="50" y1="36" x2="62" y2="57" stroke="#ffffff" stroke-width="0.7" stroke-dasharray="2 1" opacity="0.6" />
  <line x1="50" y1="36" x2="38" y2="57" stroke="#ffffff" stroke-width="0.7" stroke-dasharray="2 1" opacity="0.6" />
</svg>
